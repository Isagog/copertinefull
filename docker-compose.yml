services:
  copfront:
    build:
      context: ./frontend
    image: copfront:0.2.0
    container_name: copfront
    user: "1000:1000"
    env_file: .secrets          # PROJECT ROOT .secrets — provides DB_PASSWORD
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - DATABASE_URL=postgresql://copertine_app:${DB_PASSWORD}@mema-postgres:5432/copertine
    ports:
      - "127.0.0.1:3737:3000"
    volumes:
      - /home/mema/code/copertinefull/images:/images:ro
    command: ["node", "server.js"]
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - mema_docker_compose_mema_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  mema_docker_compose_mema_network:
    external: true
