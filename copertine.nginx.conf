server {
    server_name dev.isagog.com;

    # Proxy Next.js frontend
    location /copertine {
        proxy_pass http://127.0.0.1:3737;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_redirect off;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()";
    }

    # Serve image files directly from host filesystem (bypasses container for efficiency)
    location /images/ {
        alias /home/mema/code/copertinefull/images/;
        autoindex off;

        # Aggressive caching — cover images are immutable once written
        expires max;
        add_header Cache-Control "public, max-age=31536000, immutable";

        # Performance
        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;

        # Security
        add_header X-Content-Type-Options "nosniff";
        add_header Access-Control-Allow-Origin "https://dev.isagog.com";
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";

        # Only allow safe methods
        limit_except GET HEAD {
            deny all;
        }
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/dev.isagog.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/dev.isagog.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

    access_log /var/log/nginx/copertine-access.log combined;
    error_log /var/log/nginx/copertine-error.log;
}

server {
    if ($host = dev.isagog.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name dev.isagog.com;
    return 404; # managed by Certbot
}
